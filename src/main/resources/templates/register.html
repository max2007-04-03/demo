<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Реєстрація - Scooter Rent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
  <h3 class="text-center mb-4">Реєстрація</h3>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <form th:action="@{/register}" method="post">
    <div class="mb-3">
      <label class="form-label">Email адреса</label>
      <input type="email" name="email" class="form-control" required placeholder="name@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <input type="password" name="password" class="form-control" required minlength="6" placeholder="Мінімум 6 символів">
    </div>
    <div class="row mb-3">
      <div class="col">
        <label class="form-label">Ім'я</label>
        <input type="text" name="firstName" class="form-control" required placeholder="Максим">
      </div>
      <div class="col">
        <label class="form-label">Прізвище</label>
        <input type="text" name="lastName" class="form-control" required placeholder="Сливка">
      </div>
    </div>
    <button type="submit" class="btn btn-success w-100 mb-3">Зареєструватися</button>

    <div class="text-center">
      <a th:href="@{/login}" class="text-decoration-none">Вже є акаунт? Увійти</a>
    </div>

  </form>
</div>

</body>
</html>
