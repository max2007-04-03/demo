<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід - Scooter Rent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
    <h3 class="text-center mb-4">Вхід у систему</h3>

    <div th:if="${param.error}" class="alert alert-danger">Невірний email або пароль!</div>
    <div th:if="${param.logout}" class="alert alert-success">Ви успішно вийшли з системи.</div>

    <div th:if="${param.registered}" class="alert alert-success">Реєстрація успішна! Тепер ви можете увійти.</div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Email адреса</label>
            <input type="email" name="username" class="form-control" required placeholder="name@example.com">
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" required minlength="6" placeholder="Введіть пароль">
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Увійти</button>

        <div class="text-center">
            <a th:href="@{/register}" class="text-decoration-none">Немає акаунту? Зареєструватися</a>
        </div>
    </form>
</div>

</body>
</html>
