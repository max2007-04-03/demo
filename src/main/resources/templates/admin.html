<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Панель Адміністратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand"> Адмін-панель </span>
        <a href="/" class="btn btn-outline-light btn-sm">На головну (як Клієнт)</a>
    </div>
</nav>

<div class="container">

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white"><h5>+ Додати новий самокат</h5></div>
        <div class="card-body">
            <form th:action="@{/admin/scooters/add}" method="post" class="row g-3">

                <div class="col-md-4">
                    <select name="model" class="form-select" required>
                        <option value="" disabled selected>Оберіть модель самоката...</option>
                        <option value="Xiaomi Pro 2">Xiaomi Pro 2</option>
                        <option value="Ninebot Max G30">Ninebot Max G30</option>
                        <option value="Dualtron Mini">Dualtron Mini</option>
                        <option value="Bolt Custom">Bolt Custom</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <select name="stationId" class="form-select" required>
                        <option value="" disabled selected>Оберіть станцію...</option>
                        <option th:each="station : ${stations}"
                                th:value="${station.id}"
                                th:text="${station.name + ' (' + station.city + ')'}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Створити</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white"><h5>+ Додати нову станцію</h5></div>
        <div class="card-body">
            <form th:action="@{/admin/stations/add}" method="post" class="row g-3">

                <div class="col-md-4">
                    <input type="text" name="name" class="form-control" placeholder="Назва станції (напр. Парк Шевченка)" required>
                </div>
                <div class="col-md-4">
                    <input type="text" name="city" class="form-control" placeholder="Місто (напр. Одеса)" required>
                </div>
                <div class="col-md-2">
                    <input type="number" name="capacity" class="form-control" placeholder="Місткість (місць)" min="1" required>
                </div>

                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Створити</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Модель</th>
                    <th>Статус</th>
                    <th>Станція</th> <th>Керування</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="scooter : ${scooters}">
                    <td th:text="${scooter.id}"></td>
                    <td th:text="${scooter.model}"></td>
                    <td>
            <span th:class="${scooter.status.name() == 'AVAILABLE' ? 'badge bg-success' : 'badge bg-secondary'}"
                  th:text="${scooter.status}"></span>
                    </td>

                    <td th:text="${scooter.station != null ? scooter.station.name : 'Не на станції (В оренді)'}"></td>

                    <td>
                        <div class="d-flex gap-2">
                            <form th:action="@{/admin/scooters/{id}/charge(id=${scooter.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-info">⚡ Зарядка</button>
                            </form>

                            <form th:action="@{/admin/scooters/{id}/repair(id=${scooter.id})}" method="post" class="d-flex gap-1">
                                <select name="hours" class="form-select form-select-sm" style="width: 100px;">
                                    <option value="1">1 год</option>
                                    <option value="5">5 год</option>
                                    <option value="24">1 день</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-outline-warning">🛠️ Ремонт</button>
                            </form>

                            <form th:action="@{/admin/scooters/{id}/delete(id=${scooter.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Ви впевнені, що хочете видалити цей самокат?');">
                                    🗑️ Видалити
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
